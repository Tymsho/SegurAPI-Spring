# Importar variables de entorno nativamente indicando que es formato properties
spring.config.import=optional:file:.env[.properties],optional:file:SegurAPI-Spring/.env[.properties]

# Puerto del servidor
server.port=8080

# Conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/seguros_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate (Crea las tablas automáticamente)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuración del Servidor de Correo (SMTP de Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:TU_CORREO_AQUI}
spring.mail.password=${MAIL_PASSWORD:TU_CONTRASEÑA_AQUI}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Configuración de Archivos (Uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads/

# Credenciales de MercadoPago (Token de Prueba)
mp.access.token=${MP_ACCESS_TOKEN:TEST-TU-TOKEN-AQUI}
