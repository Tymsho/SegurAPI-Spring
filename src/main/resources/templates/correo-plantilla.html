<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { background-color: #007bff; color: white; text-align: center; padding: 15px; border-radius: 8px 8px 0 0; }
        .content { padding: 20px; font-size: 16px; line-height: 1.5; }
        .footer { text-align: center; font-size: 12px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 th:text="${titulo}">Notificación SegurAPI</h1>
        </div>
        <div class="content">
            <p th:text="${mensaje}">Hola, tienes una nueva actualización.</p>
        </div>
        <div class="footer">
            <p>Gracias por usar SegurAPI.</p>
        </div>
    </div>
</body>
</html>
